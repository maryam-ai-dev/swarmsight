name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dash-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dash check
        run: bash scripts/check-dashes.sh

  authority:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: authority
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test Authority
        run: mvn -B test

  intelligence:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test Intelligence
        run: pytest -q
