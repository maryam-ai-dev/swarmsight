# Disable the Ryuk resource reaper. The JVM stops the container at shutdown,
# and Ryuk needs privileges some sandboxed and CI environments do not grant.
ryuk.disabled=true

# Connect straight to the local Docker unix socket. Without this, strategy
# auto-detection can wrongly pick the Docker Desktop strategy and abort.
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy
