spring:
  application:
    name: authority
  datasource:
    url: ${AUTHORITY_DB_URL:jdbc:postgresql://localhost:5432/swarmsight}
    username: ${AUTHORITY_DB_USER:swarmsight}
    password: ${AUTHORITY_DB_PASSWORD:swarmsight}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

swarmsight:
  # Seed the demo case HX-4471 on startup so the Case surface has a real verdict
  # to render. Idempotent. Switch off in tests.
  demo-seed: true
  # Where the live agent (Intelligence) is reached for assurance runs.
  intelligence:
    base-url: ${INTELLIGENCE_BASE_URL:http://localhost:8000}
  governance:
    # The certified regime is the default and fails closed. These named actors
    # are the explicit exemption: demo and trial fixtures that operate outside
    # the certified regime, decided on policy alone. Empty this for production;
    # any unlisted, uncertified actor is blocked. See DECISIONS.md.
    shadow-actors: ${SHADOW_ACTORS:agent-1,agent-housing-1}
  cors:
    # Comma-separated origin patterns. The default is open for the demo; a pilot
    # locks this to its real frontend origin, for example https://swarmsight.gov.uk.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
